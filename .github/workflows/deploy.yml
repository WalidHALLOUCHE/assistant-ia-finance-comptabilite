name: Deploy to Streamlit Cloud

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Push to Streamlit Cloud
      env:
        STREAMLIT_TOKEN: ${{ secrets.STREAMLIT_TOKEN }}
      run: |
        # Streamlit Cloud watches this repo directly
        # No additional action needed - Streamlit Cloud auto-deploys on push
        echo "Deployment triggered. Check Streamlit Cloud dashboard for progress."
